name: Benchmarks

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run benchmarks
        run: |
          mkdir -p _site
          pnpm --filter lazy-dom benchmark -- --md _site/index.md

      - name: Add Jekyll front matter
        run: |
          sed -i '1s/^/---\ntitle: Benchmarks\n---\n/' _site/index.md

      - name: Add Jekyll config
        run: |
          echo 'theme: jekyll-theme-cayman' > _site/_config.yml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Update benchmarks"
